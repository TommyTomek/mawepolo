<div class="discover-card" (click)="onClick()" [class.is-animating]="animating">

  <div class="card-image" [style.background-image]="'url(' + image + ')'"></div>
  <div class="gradient-overlay"></div>

  <h2>{{ title }}</h2>
  <p>{{ description }}</p>

  <!-- Loading bar -->
  <div class="loading-bar" *ngIf="animating"></div>

</div>
