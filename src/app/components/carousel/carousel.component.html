<div class="related-carousel-wrapper">

  <!-- Arrows -->
  <button class="carousel-arrow left" type="button" aria-label="Previous">‹</button>
  <button class="carousel-arrow right" type="button" aria-label="Next">›</button>

  <!-- Scroll Row -->
  <div class="related-scroll-row" #relatedRow>

    <!--
      FIX: track by the precomputed `_key` (unique across BOTH clone groups
      and the real middle copy) instead of `item.slug + (item._clone ? '-clone' : '')`.
      The old expression produced the same key for a card in the leading
      clone group and the trailing clone group, which is an invalid
      duplicate for @for's `track` and let Angular reuse/misplace DOM
      nodes between them.
    -->
    @for (item of loopedItems; track item._key) {

      <div class="related-card">

        <app-discover-card
          class="discover-wrapper"
          [title]="item.title"
          [description]="item.text"
          [image]="item.img"
          [region]="regionSlug"
          [category]="item.category"
          [slug]="item.slug"
          [animateOnClick]="true">
        </app-discover-card>

      </div>

    }

  </div>
</div>
