<section class="login-wrapper">

  <div class="login-card">

    <h2 class="title">
      Welcome to <span class="brand">MaWePolo</span>
    </h2>

    <form [formGroup]="form" class="login-form" >

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="you@example.com" formControlName="email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••" formControlName="password" required />
      </div>

      <button class="login-btn" (click)="signInWithEmail()">Log In</button>

    </form>
    <div class="auth-links">
        <a routerLink="/register" class="auth-link">Don’t have an account?</a>
        <a routerLink="/forgot-password" class="auth-link">Forgot password</a>
    </div>

    
  </div>

</section>
