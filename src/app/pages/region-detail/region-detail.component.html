@if (region && detail) {
<div class="detail-wrapper">

  <!-- ===========================
       HERO SECTION
       =========================== -->
  @let heroItem = getHeroItem();
  <div class="hero-section loading" [attr.data-bg]="heroItem?.img">
    <div class="hero-overlay"></div>


    <div class="hero-content">
      <h1 class="hero-title">{{ heroItem?.title }}</h1>
      <p class="hero-region">{{ region.hero.title }}</p>
      <p class="hero-description">{{ detail.description }}</p>
    </div>
  </div>

  <!-- ===========================
       WHITE CONTENT CONTAINER
       =========================== -->
  <div class="content-container">

    <!-- BLOCKS -->
    <section class="blocks">
      @for (block of detail.blocks; track block.title) {
        <div class="block">
          <div class="block-image loading" [attr.data-bg]="block.img"></div>
          <div class="block-content">
            <h2>{{ block.title }}</h2>
            <p>{{ block.text }}</p>
          </div>
        </div>
      }
    </section>

    

      <!-- Title -->
    <h3 class="carousel-title">discover more from {{ region.slug }}</h3>
    <div class="carusel-container">
    <app-related-carousel
      [title]="'regionDetail.moreFrom' | translate:{ region: region.hero.title }"
      [items]="getCarouselItems()"
      [regionSlug]="regionSlug"
      (navigate)="navigateToRelated($event)"
    />
    </div>
  </div>

</div>
}
