<section class="auth-wrapper">

  <div class="auth-card">

    <h2 class="title">
      Create your <span class="brand">MaWePolo</span> account
    </h2>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="createAccount()">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" formControlName="fullName" placeholder="John Doe" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••••" />
      </div>

      <button class="auth-btn" type="submit">Create Account</button>

      <div class="auth-links">
        <a routerLink="/login" class="auth-link">Already have an account?</a>
      </div>

    </form>


  </div>

</section>
